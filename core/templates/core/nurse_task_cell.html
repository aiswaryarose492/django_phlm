{% load custom_filters %}
{% with task_data=tasks|lookup:task %}
{% if task_data %}
    {% with completed_by=task_data|lookup:shift %}
    {% if completed_by %}
    <span class="badge bg-success" title="{{ completed_by }}"><i class="fas fa-check"></i></span>
    {% else %}
    <button class="btn btn-sm btn-outline-success py-0 px-2" data-admission="{{ admission_id }}" data-task="{{ task }}" data-shift="{{ shift }}" onclick="markTask(this)"><i class="fas fa-check"></i></button>
    {% endif %}
    {% endwith %}
{% else %}
<button class="btn btn-sm btn-outline-success py-0 px-2" data-admission="{{ admission_id }}" data-task="{{ task }}" data-shift="{{ shift }}" onclick="markTask(this)"><i class="fas fa-check"></i></button>
{% endif %}
{% endwith %}
